<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendulum Lab | Scientific Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0047AB; /* Cobalt Blue */
            --secondary: #89E37B; /* Granny Smith Apple */
            --accent: #FFD700; /* Yellow */
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --radius: 20px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 2rem; }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, #002d6b 100%);
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: var(--shadow);
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 1.5rem;
            left: 2rem;
            padding: 0.75rem 1.5rem;
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            border-radius: 99px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .back-btn:hover { background: white; color: var(--primary); }

        .dashboard {
            max-width: 1300px;
            margin: 2rem auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            padding: 0 2rem;
        }

        .stat-card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border-bottom: 4px solid var(--secondary);
            text-align: center;
        }
        .stat-label { font-size: 0.7rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; font-weight: 700; color: var(--primary); }

        .main-container {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            padding: 0 2rem;
        }

        .card { background: var(--card); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); }

        .sim-area { background: #0f172a; border-radius: 16px; position: relative; overflow: hidden; height: 500px; }
        canvas#pendulumCanvas { width: 100%; height: 100%; cursor: crosshair; }

        .control-group { margin-bottom: 1.5rem; }
        h2 { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }

        .slider-box { margin-bottom: 1rem; }
        .slider-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.85rem; font-weight: 600; }
        .slider-val { font-family: 'JetBrains Mono', monospace; color: var(--primary); }

        input[type="range"] { appearance: none; -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; background: #e2e8f0; outline: none; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: white; border: 3px solid var(--primary); cursor: pointer;
        }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 2rem; }
        .btn { padding: 0.75rem; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: all 0.3s; }
        .btn-p { background: var(--secondary); color: #064e3b; }
        .btn-s { background: #f1f5f9; color: var(--muted); }

        @media (max-width: 1000px) {
            .main-container { grid-template-columns: 1fr; }
            .dashboard { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="back-btn">← Home</a>
        <h1>Simple Pendulum Lab</h1>
        <p>Non-linear Oscillatory Dynamics & Energy Conservation</p>
    </header>

    <div class="dashboard">
        <div class="stat-card"><div class="stat-label">Angle</div><div class="stat-value" id="s-angle">0.0°</div></div>
        <div class="stat-card"><div class="stat-label">Velocity</div><div class="stat-value" id="s-vel">0.00 m/s</div></div>
        <div class="stat-card"><div class="stat-label">Potential E</div><div class="stat-value" id="s-pe">0.00 J</div></div>
        <div class="stat-card"><div class="stat-label">Kinetic E</div><div class="stat-value" id="s-ke">0.00 J</div></div>
    </div>

    <div class="main-container">
        <main class="card">
            <div class="sim-area">
                <canvas id="pendulumCanvas"></canvas>
                <div style="position: absolute; bottom: 20px; left: 20px; color: white; opacity: 0.5; font-size: 0.7rem;">DRAG BOB TO SET STARTING ANGLE</div>
            </div>
        </main>

        <aside class="card">
            <h2>Parameters</h2>
            <div class="slider-box">
                <div class="slider-header"><span>Length (L)</span><span class="slider-val" id="lv">1.50 m</span></div>
                <input type="range" id="sl" min="0.5" max="3" step="0.05" value="1.5">
            </div>
            <div class="slider-box">
                <div class="slider-header"><span>Mass (m)</span><span class="slider-val" id="mv">1.0 kg</span></div>
                <input type="range" id="sm" min="0.1" max="5" step="0.1" value="1">
            </div>
            <div class="slider-box">
                <div class="slider-header"><span>Gravity (g)</span><span class="slider-val" id="gv">9.81 m/s²</span></div>
                <input type="range" id="sg" min="1" max="25" step="0.1" value="9.81">
            </div>
            <div class="slider-box">
                <div class="slider-header"><span>Damping (b)</span><span class="slider-val" id="bv">0.00</span></div>
                <input type="range" id="sb" min="0" max="1" step="0.01" value="0">
            </div>
            <div class="btn-row">
                <button class="btn btn-p" id="play">PAUSE</button>
                <button class="btn btn-s" id="reset">RESET</button>
            </div>

            <div style="margin-top: 2rem; border-top: 1px solid #e2e8f0; padding-top: 1.5rem;">
                <h2 style="font-size: 0.8rem; opacity: 0.6;">Learning Hub</h2>
                <div class="btn-row">
                    <a href="laws.html" class="btn btn-s" style="text-decoration: none; font-size: 0.75rem; background: #fff; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center;"><i class="fas fa-book" style="margin-right: 5px; color: var(--primary)"></i> Laws</a>
                    <a href="quizzes.html" class="btn btn-s" style="text-decoration: none; font-size: 0.75rem; background: #fff; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center;"><i class="fas fa-graduation-cap" style="margin-right: 5px; color: var(--secondary)"></i> Quiz</a>
                </div>
            </div>
        </aside>
    </div>

    <script>
        const canvas = document.getElementById('pendulumCanvas');
        const ctx = canvas.getContext('2d');
        let state = { L:1.5, m:1, g:9.81, b:0, th:Math.PI/4, om:0, running:true };

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        document.getElementById('sl').addEventListener('input', e => { state.L = parseFloat(e.target.value); document.getElementById('lv').textContent = state.L.toFixed(2) + ' m'; });
        document.getElementById('sm').addEventListener('input', e => { state.m = parseFloat(e.target.value); document.getElementById('mv').textContent = state.m.toFixed(1) + ' kg'; });
        document.getElementById('sg').addEventListener('input', e => { state.g = parseFloat(e.target.value); document.getElementById('gv').textContent = state.g.toFixed(2) + ' m/s²'; });
        document.getElementById('sb').addEventListener('input', e => { state.b = parseFloat(e.target.value); document.getElementById('bv').textContent = state.b.toFixed(2); });
        document.getElementById('play').addEventListener('click', e => { state.running = !state.running; e.target.textContent = state.running ? 'PAUSE' : 'RESUME'; });
        document.getElementById('reset').addEventListener('click', () => { state.th = Math.PI/4; state.om = 0; });

        // Interaction
        let dragging = false;
        canvas.addEventListener('mousedown', () => dragging = true);
        window.addEventListener('mouseup', () => dragging = false);
        canvas.addEventListener('mousemove', e => {
            if(!dragging) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width/2;
            const y = e.clientY - rect.top - 80;
            state.th = Math.atan2(x, y);
            state.om = 0;
        });

        function loop() {
            if(state.running && !dragging) {
                // RK2
                const dt = 0.016;
                const getAcc = (th, om) => -(state.g / state.L) * Math.sin(th) - (state.b / state.m) * om;
                
                const k1_th = state.om;
                const k1_om = getAcc(state.th, state.om);
                
                const k2_th = state.om + k1_om * dt;
                const k2_om = getAcc(state.th + k1_th * dt, state.om + k1_om * dt);
                
                state.th += (k1_th + k2_th)/2 * dt;
                state.om += (k1_om + k2_om)/2 * dt;
            }

            ctx.clearRect(0,0,canvas.width,canvas.height);
            const px = canvas.width/2;
            const py = 80;
            const scale = 120;
            const bx = px + state.L * scale * Math.sin(state.th);
            const by = py + state.L * scale * Math.cos(state.th);

            // String
            ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(bx, by); ctx.stroke();

            // Vectors
            const vScale = 30;
            const fScale = 10;
            
            // Velocity Vector (Granny Smith Apple)
            const vx = state.L * state.om * Math.cos(state.th);
            const vy = -state.L * state.om * Math.sin(state.th);
            drawVector(bx, by, bx + vx * vScale, by + vy * vScale, '#89E37B', 'v');

            // Gravity Force (Yellow)
            const fg = state.m * state.g;
            drawVector(bx, by, bx, by + fg * fScale, '#FFD700', 'Fg');

            // Tension (Blue)
            // Ft = m * g * cos(theta) + m * v^2 / L
            const ft = state.m * state.g * Math.cos(state.th) + (state.m * (state.L * state.om)**2) / state.L;
            const ftx = -ft * Math.sin(state.th);
            const fty = -ft * Math.cos(state.th);
            drawVector(bx, by, bx + ftx * fScale, by + fty * fScale, '#3b82f6', 'Ft');

            // Restoring Force (Resultant of Fg and Ft) - Cobalt Blue
            const fr = -state.m * state.g * Math.sin(state.th);
            const frx = fr * Math.cos(state.th);
            const fry = -fr * Math.sin(state.th);
            drawVector(bx, by, bx + frx * fScale, by + fry * fScale, '#0047AB', 'Fr');

            // Legend
            drawLegend([
                { color: '#89E37B', text: 'v : Velocity' },
                { color: '#FFD700', text: 'Fg: Gravity' },
                { color: '#3b82f6', text: 'Ft: Tension' },
                { color: '#0047AB', text: 'Fr: Restoring Force' }
            ]);

            // Pivot ...
            ctx.fillStyle = '#f8fafc'; ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI*2); ctx.fill();

            // Bob
            const grad = ctx.createRadialGradient(bx-5, by-5, 2, bx, by, 20);
            grad.addColorStop(0, '#0047AB'); grad.addColorStop(1, '#002d6b');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(bx, by, 20 + state.m*2, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#89E37B'; ctx.lineWidth = 3; ctx.stroke();

            // Stats
            const v = state.L * state.om;
            const h = state.L * (1 - Math.cos(state.th));
            const pe = state.m * state.g * h;
            const ke = 0.5 * state.m * v * v;

            document.getElementById('s-angle').textContent = (state.th * 180 / Math.PI).toFixed(1) + '°';
            document.getElementById('s-vel').textContent = Math.abs(v).toFixed(2) + ' m/s';
            document.getElementById('s-pe').textContent = pe.toFixed(2) + ' J';
            document.getElementById('s-ke').textContent = ke.toFixed(2) + ' J';

            requestAnimationFrame(loop);
        }

        function drawVector(x1, y1, x2, y2, color, label) {
            if(Math.sqrt((x2-x1)**2 + (y2-y1)**2) < 5) return;
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            const angle = Math.atan2(y2 - y1, x2 - x1);
            const head = 10;
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - head * Math.cos(angle - 0.4), y2 - head * Math.sin(angle - 0.4));
            ctx.lineTo(x2 - head * Math.cos(angle + 0.4), y2 - head * Math.sin(angle + 0.4));
            ctx.fill();

            ctx.font = 'bold 12px JetBrains Mono';
            ctx.fillText(label, x2 + 5, y2 + 5);
        }

        function drawLegend(items) {
            const x = 20;
            let y = 30;
            ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
            ctx.roundRect(x - 10, y - 20, 160, items.length * 25 + 15, 12);
            ctx.fill();
            
            items.forEach(item => {
                ctx.fillStyle = item.color;
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = '600 11px Outfit';
                ctx.fillText(item.text, x + 15, y + 4);
                y += 25;
            });
        }
        loop();
    </script>
</body>
</html>
